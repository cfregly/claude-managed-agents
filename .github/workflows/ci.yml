name: ci

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: deslop gate (README and CLAUDE.md)
        run: python scripts/deslop_check.py
      - name: smoke run (offline dry run of every surface)
        run: python run.py
